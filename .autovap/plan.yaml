# ─────────────────────────────────────────────────────────────────────────
# AutoVAP v2 — Migration Manifest
# Target: buddypress-activity-share-pro
# Goal:   Docs-first takeover, batch 2 — convert rich loose docs into a
#         verified docs/website/ tree (NN-prefixed, docs_config.json, images/)
#         + FEATURES.json with file:line evidence.
#
# This is a DOCS run. No source code is edited. Code findings (bugs, orphaned
# handlers, the phantom REST namespace) are flagged for Basecamp cards, never
# fixed here. Contracts below are GREP-VERIFIED against EXECUTABLE PHP only —
# see .autovap/plan-rationale.md for the verification table + drift findings.
# ─────────────────────────────────────────────────────────────────────────
version: 1

target:
  type: plugin
  slug: buddypress-activity-share-pro
  path: /Users/varundubey/Documents/GitHub/buddypress-activity-share-pro
  repo: wbcomdesigns/buddypress-activity-share-pro
  local_wp_site: support-reference-wp (docker)
  site_url: http://localhost:8080
  basecamp_project_id: "37939219"

goal: >
  Docs-first takeover (batch 2): this repo has rich loose guides under docs/
  (COMPLETE-USER-GUIDE, COMPLETE-DEVELOPER-GUIDE, FEATURE-SUMMARY, etc.) but no
  docs/website/. Audit the real code surface, verify every loose guide against
  the audited surface and decide fold-in, scaffold docs/website/ per the wbcom
  docs guideline (NN-prefixed kebab files, docs_config.json with bpas-suffixed
  slugs, images/) folding in only verified content, and produce a FEATURES.json
  carrying file:line evidence for every claim. Doc-accuracy gates protect the
  rewrite waves; the verification wave's job is to FIND the inaccuracies.

# ── CONTRACTS ──────────────────────────────────────────────────────────────
# GREP-VERIFIED public surface. Every entry below has at least one executable
# (non-display-text) hit under admin/ includes/ public/ buddypress-share.php.
# Verification table with file:line lives in plan-rationale.md.
#
# DELIBERATELY ABSENT: a `bp-share/v1` REST namespace. COMPLETE-DEVELOPER-GUIDE.md
# documents 5 such endpoints (/statistics, /track, /reshare, /services,
# /users/{id}/shares) but `register_rest_route` returns ZERO hits anywhere in
# the repo. That is the headline drift: documented surface with no executable
# backing. The ONLY REST surface is a single field embedded into BuddyPress's
# existing activity response via the `bp_rest_activity_prepare_value` filter.
contracts:
  hooks:
    actions:
      - "bp_share_clear_public_cache"
      - "bp_share_before_sanitize_extra_settings"
      - "bp_share_after_sanitize_extra_settings"
      - "bp_share_uninstalled"
      - "bp_share_internal_share_tracked"
      - "bp_share_external_visit_tracked"
      - "bp_share_external_share_tracked"
      - "bp_share_user_stats_updated"
      - "bp_share_activity_stats_updated"
      - "bp_share_activity_visit_stats_updated"
      - "bp_share_plugin_upgraded"
      - "bp_share_deactivated"
      - "bp_share_post_visit_tracked"
      - "bp_share_post_shared"
      - "bp_share_post_visit_tracked_data"
      - "bp_share_after_create_reshare"
      - "bp_share_user_reshared_activity"
      - "bp_activity_share_before_post_meta"
      - "bp_activity_share_after_post_meta"
      - "bp_share_user_services"
    filters:
      - "bp_share_sanitized_extra_settings"
      - "bp_share_use_cdn_assets"
      - "bp_share_available_services"
      - "bp_share_activity_classes"
      - "bp_share_use_minified_assets"
      - "buddypress_share_theme_support"
      - "bp_share_enable_post_type_sharing"
      - "bp_share_allow_anonymous_sharing"
      - "bp_share_rate_limit"
      - "bp_share_post_url"
      - "bp_share_post_tracking_url"
      - "bp_share_post_type_available_services"
      - "bp_share_post_type_whitelist"
      - "bp_share_post_type_is_valid"
      - "bp_share_valid_post_types"
      - "bp_share_disable_ip_tracking"
      - "bp_share_anonymize_ip"
      - "bp_share_before_create_reshare"
      - "bp_activity_reshare_post_type"
      - "bp_activity_reshare_action"
      - "bp_activity_share_load_assets"
      - "bp_share_activity_data"
      - "bp_share_social_button_html"
      - "bp_share_services_config"
      - "bp_share_tracking_parameters"
      - "buddypress_reactions_theme_support"
      - "wbcom_submenu_label"
  options:
    - "bp_share_services"
    - "bp_share_services_enable"
    - "bp_share_services_logout_enable"
    - "bp_share_services_extra"
    - "bp_share_services_serialized"
    - "bp_share_services_old"
    - "bp_reshare_settings"
    - "bpas_icon_color_settings"
    - "bp_share_plugin_version"
    - "bp_share_db_version"
    - "bp_share_install_date"
  db_schema:
    - table: "bp_share_post_tracking"
      columns: ["id", "post_id", "post_type", "service", "user_id", "ip_address", "user_agent", "referrer", "shared_at"]
    - table: "bp_share_post_type_settings"
      columns: ["id", "post_type", "enabled_services", "position", "style", "custom_settings", "created_at", "updated_at"]
  shortcodes:
    - "bp_activity_post_reshare"

# Empty: this is a docs run, no contract is allowed to change. Any contract
# delta surfaced during verification is a Basecamp card, not a migration.
migrations: []

# ── STANDARDS ────────────────────────────────────────────────────────────────
standards:
  build_skills:  [documentation]
  audit_skills:  [wp-project-triage]
  wpcs_standard: WordPress-Extra

# ── GATES ──────────────────────────────────────────────────────────────────
gates:
  default_static:     [docs-lint, link-check]
  default_functional: []

# ── JOURNEYS ─────────────────────────────────────────────────────────────────
# Doc-accuracy journeys. These gate the REWRITE waves (3, 4) ONLY — never the
# verification wave (2), whose whole job is to surface the inaccuracies.
journeys:
  - id: dev-hooks-match-code
    role: admin
    steps:
      - "open docs/website/developer-guide hooks + filters reference"
      - "for each documented hook, confirm a matching executable do_action/apply_filters in admin|includes|public"
      - "no hook is documented that grep cannot find in executable PHP (display-text matches do not count)"
      - "no executable hook in the contract list is missing from the reference"
  - id: dev-rest-claims-honest
    role: admin
    steps:
      - "open docs/website/developer-guide REST section"
      - "confirm it describes ONLY the bp_rest_activity_prepare_value field embed"
      - "confirm NO bp-share/v1 namespace or /statistics /track /reshare /services /users endpoints are claimed"
      - "any aspirational endpoint is labelled roadmap or removed, never presented as shipping"
  - id: owner-settings-doc-matches-ui
    role: admin
    steps:
      - "WP Admin -> WBcom Designs -> Activity Share settings (admin.php?page=wbcom-buddypress-share)"
      - "open docs/website settings reference"
      - "every documented setting/option key maps to a real tab + registered option (bp_share_general_settings / bp_reshare_settings / bpas_icon_color_settings / post-type settings)"
      - "no documented setting is absent from the live UI; no live tab is undocumented"
  - id: owner-post-type-sharing-doc
    role: admin
    steps:
      - "enable post type sharing; open the docs/website post-type sharing guide"
      - "documented services, position/style options, and rate-limit match the post-type settings + bp_share_rate_limit filter"
      - "the [bp_activity_post_reshare] shortcode is documented with the exact tag used in code"

# ── WAVES ────────────────────────────────────────────────────────────────────
waves:

  # Wave 1 — AUDIT the real code surface (read-only producer). No deps.
  # Establishes ground truth the later waves verify docs against.
  - id: wave-1-audit-surface
    depends_on: []
    functional_gates: []
    journeys: []
    directions:
      - id: "1.1"
        title: "Audit real code surface: hooks, options, tables, shortcode, AJAX, the single REST field embed; capture file:line evidence"
        journey: audit
        scope: ["audit/**", "AUDIT-VERDICT.md"]
        skills: [wp-project-triage, documentation]
        static_gates: []
        depends_on: []

  # Wave 2 — VERIFY loose guides against the audited surface; decide fold-in.
  # No doc-accuracy journeys here — this wave EXISTS to find the inaccuracies.
  # Output is a verification ledger + fold-in decisions + flagged code findings.
  - id: wave-2-verify-loose-docs
    depends_on: [wave-1-audit-surface]
    functional_gates: []
    journeys: []
    directions:
      - id: "2.1"
        title: "Verify each loose guide claim vs audited surface; mark verified/drift/aspirational; record Basecamp-card candidates for code findings"
        journey: audit
        scope: ["audit/docs-verification/**", "audit/**"]
        skills: [wp-project-triage, documentation]
        static_gates: []
        depends_on: []

  # Wave 3 — SCAFFOLD docs/website/ folding in ONLY verified content.
  # Doc-accuracy journeys gate from here on.
  - id: wave-3-scaffold-website-docs
    depends_on: [wave-2-verify-loose-docs]
    functional_gates: []
    journeys:
      - owner-settings-doc-matches-ui
      - owner-post-type-sharing-doc
      - dev-hooks-match-code
      - dev-rest-claims-honest
    directions:
      - id: "3.1"
        title: "Scaffold docs/website skeleton: docs_config.json (bpas-suffixed slugs), images/, getting-started + user-guide sections (verified user content only)"
        journey: customer-docs
        scope:
          - "docs/website/docs_config.json"
          - "docs/website/images/**"
          - "docs/website/getting-started/**"
          - "docs/website/user-guide/**"
        skills: [documentation]
        static_gates: [docs-lint, link-check]
        depends_on: []
      - id: "3.2"
        title: "Developer-guide section: hooks/filters reference + honest REST section (field embed only, no phantom bp-share/v1) + shortcode reference"
        journey: customer-docs
        scope:
          - "docs/website/developer-guide/**"
        skills: [documentation]
        static_gates: [docs-lint, link-check]
        depends_on: ["3.1"]

  # Wave 4 — FEATURES.json with file:line evidence per claim. Built from the
  # wave-1 audit + wave-2 ledger; gated by the same doc-accuracy journeys.
  - id: wave-4-features-evidence
    depends_on: [wave-3-scaffold-website-docs]
    functional_gates: []
    journeys:
      - dev-hooks-match-code
      - dev-rest-claims-honest
    directions:
      - id: "4.1"
        title: "Author FEATURES.json: one entry per shipped feature with file:line evidence; phantom/aspirational items excluded or marked roadmap"
        journey: customer-docs
        scope: ["docs/website/FEATURES.json", "FEATURES.json"]
        skills: [documentation]
        static_gates: [docs-lint]
        depends_on: []
